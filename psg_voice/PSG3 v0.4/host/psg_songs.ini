; PSG v0.2 曲目库 (用户可自由编辑增删)
; ============================================================
; 音符格式:  音级:拍数
;   音级: 1-7 = do re mi fa sol la si,  0 = 休止
;   拍数: 1=一拍  2=两拍  0.5=半拍  1.5=附点  3=三拍
;   高八度: 音级前加 ^  (例: ^1:1 = 高八度 do, 一拍)
;   低八度: 音级前加 ,  (例: ,5:1 = 低八度 sol)
;   升半音: 音级后加 +  (例: 5+:1 = sol# = 升 sol, 一拍)
;   降半音: 音级后加 -  (例: 6-:1 = lab = 降 la, 一拍)
;   组合例: ^5+:0.5 = 高八度升 sol 半拍  ,3-:2 = 低八度降 mi 两拍
;   噪音乐器: 音级位置写乐器名 (在 [noise_N] 定义), 如 bd:1 = 底鼓一拍
; 调号 (可选): key = C/D/E/F/G/A/B (可带 #/b)
;   不写则默认 C 大调. 例: key=F 表示 1(do)=F, 全曲上移 5 半音.
;   可带八度前缀: ^C 升一个八度, ,C 降一个八度 (例: key=^C 整曲高八度).
;   与音符级 +/- 独立叠加 (key 移全曲, +/- 改单个音).
; 分隔符: 空格 或 | (| 仅美观, 可省略)
; ------------------------------------------------------------
; 噪音乐器 [noise_N] 块:
;   noise_ins_name = bd           乐器名 (notes 里用此名当音级, 如 bd:1)
;   noise_volume = 15,13,10       音量包络 (逐步衰减, 铺满音符时长)
;   noise_step = 0.1s             (保留字段, dump 时 step = 音符时长/步数 自适应)
;   noise_mode = independent      independent(独立分频) / bind(绑定方波 TC)
;   noise_freq = /16              频率挡: /2 /4 /8 /16
; ------------------------------------------------------------
; 新增曲目: 复制一个 [song_N] 段, 改 name/octave/key/notes 即可.
;   section 名必须 song_ 开头 + 数字, 数字决定播放顺序.
; ============================================================

; === 噪音乐器 (鼓组) ===
[noise_1]
noise_ins_name = bd
noise_volume = 15,5,1,0
noise_step = 0.01s
noise_mode = independent
noise_freq = /16

[noise_2]
noise_ins_name = sd
noise_volume = 15,8,7,5,1,0
noise_step = 0.01s
noise_mode = independent
noise_freq = /16

[noise_3]
noise_ins_name = hh
noise_volume = 8,5,0
noise_step = 0.01s
noise_mode = independent
noise_freq = /8

[noise_4]
noise_ins_name = top
noise_volume = 15,10,8,5,3,0
noise_step = 0.1s
noise_mode = independent
noise_freq = /2

; === 方波乐器 (square instrument) ===
; notes 里用 乐器名:音级:拍数 切换, 如 sq50:1:1. 切换后保持直到下次切换.
[square_1]
noise_ins_name = sq50
square_mode = square
wave = square
square_duty = 50
octave_shift = 0
square_volume = default

[square_2]
noise_ins_name = sq25
square_mode = square
wave = square
square_duty = 25
octave_shift = 1
square_volume = default

[square_3]
noise_ins_name = qwave
square_mode = square
wave = q0
square_duty = 50
octave_shift = -1
square_volume = default


