; ============================================================
; PSG v0.2 曲目库 (用户可自由编辑增删)
; ============================================================
; 音符格式:  音级:拍数
;   音级: 1-7 = do re mi fa sol la si,  0 = 休止
;   拍数: 1=一拍  2=两拍  0.5=半拍  1.5=附点  3=三拍
;   高八度: 音级前加 ^  (例: ^1:1 = 高八度 do, 一拍)
;   低八度: 音级前加 ,  (例: ,5:1 = 低八度 sol)
;   升半音: 音级后加 +  (例: 5+:1 = sol# = 升 sol, 一拍)
;   降半音: 音级后加 -  (例: 6-:1 = lab = 降 la, 一拍)
;   组合例: ^5+:0.5 = 高八度升 sol 半拍  ,3-:2 = 低八度降 mi 两拍
; 调号 (可选): key = C/D/E/F/G/A/B (可带 #/b)
;   不写则默认 C 大调. 例: key=F 表示 1(do)=F, 全曲上移 5 半音.
;   可带八度前缀: ^C 升一个八度, ,C 降一个八度 (例: key=^C 整曲高八度).
;   与音符级 +/- 独立叠加 (key 移全曲, +/- 改单个音).
; 分隔符: 空格 或 | (| 仅美观, 可省略)
; ------------------------------------------------------------
; 新增曲目: 复制一个 [song_N] 段, 改 name/octave/key/notes 即可.
;   section 名必须 song_ 开头 + 数字, 数字决定播放顺序.
; ============================================================

